services:
    aura:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: aura
        restart: unless-stopped
        # Host networking is required so the container reads the host's real
        # network interfaces for live bandwidth stats. With bridge networking
        # systeminformation only sees the container's virtual veth pair (~0 B/s).
        network_mode: host
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ./config:/app/config:ro
            # Mount /mnt so all disk submounts are visible inside the container
            - type: bind
              source: /mnt
              target: /mnt
              read_only: true
              bind:
                  propagation: rslave
            # vnstat database from host so network history works
            - /var/lib/vnstat:/var/lib/vnstat:ro
            # Optional: persist auth sessions across restarts
            # - ./data:/app/data
        env_file:
            - .env
        environment:
            - NODE_ENV=production
            - PORT=2655
        # If docker.sock permission is denied, run:
        #   sudo usermod -aG docker $USER
        # or uncomment and set the docker group id:
        # group_add:
        #   - "999"
